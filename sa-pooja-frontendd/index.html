
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Marcellus&family=Crimson+Pro:wght@200;300;400;500;600;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Deep Maroon Base */
            --temple-red: #2D0505;
            --sacred-red: #1A0303;
            
            /* Primary Brand Accent */
            --antique-gold: #C5A059;
            --muted-gold: #8E6C27;
            
            /* New Secondary: Muted Sandalwood & Parchment */
            --sandalwood: #E6D5B8; /* Natural wood tone */
            --parchment: #F5F0E1; /* Readability relief */
            --sacred-teal: #4B7A7C; /* Heritage accent */
        }

        body {
            font-family: 'Crimson Pro', serif;
            background-color: var(--sacred-red);
            color: var(--sandalwood);
            margin: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Legacy static metallic text - keeping as fallback or alternative */
        .metallic-gold-text {
            background: linear-gradient(135deg, #8e6c27 0%, #cf9e42 25%, #f7e7c0 50%, #cf9e42 75%, #8e6c27 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        /* ✨ GLOW EFFECTS ✨ */
        .glow-gold-metallic { filter: drop-shadow(0 0 15px rgba(197, 160, 89, 0.35)); }
        .glow-gold-solid { text-shadow: 0 0 25px rgba(197, 160, 89, 0.25); }
        .glow-gold-cta { text-shadow: 0 0 12px rgba(197, 160, 89, 0.5); }

        /* 🌊 AMBIENT GLOW ANIMATION 🌊 */
        /* Extremely slow, almost static movement */
        @keyframes gold-ambient {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .shimmer-base {
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            /* 14s duration for a barely noticeable shift */
            animation: gold-ambient 14s linear infinite;
        }

        /* 1. Hero Headline Only: Very subtle, low contrast gradient */
        /* No bright whites, just shifting shades of warm gold */
        .text-shimmer-hero {
            background-image: linear-gradient(
                120deg,
                #8e6c27 0%,      /* Darker Gold Base */
                #9E7D35 25%,     /* Mid Gold */
                #B08D45 45%,     /* Soft Highlight (Not White) */
                #C5A059 50%,     /* Peak Highlight (Antique Gold) */
                #B08D45 55%,     /* Soft Highlight */
                #9E7D35 75%,     /* Mid Gold */
                #8e6c27 100%     /* Darker Gold Base */
            );
        }

        /* Accessibility: Disable animation for reduced motion */
        @media (prefers-reduced-motion: reduce) {
            .shimmer-base {
                animation: none;
                background: none;
                -webkit-text-fill-color: var(--antique-gold);
                color: var(--antique-gold);
            }
        }

        .h1-sacred { font-family: 'Marcellus', serif; font-weight: 700; letter-spacing: 0.02em; }
        .label-sacred { font-family: 'Inter', sans-serif; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3em; font-size: 0.65rem; }
        .body-sacred { font-family: 'Crimson Pro', serif; line-height: 1.8; }

        .gold-frame {
            border: 1px solid rgba(197, 160, 89, 0.25);
            position: relative;
            background: rgba(26, 3, 3, 0.85);
            backdrop-filter: blur(20px);
        }

        .corner-ornament {
            position: absolute;
            width: 24px;
            height: 24px;
            border: 1px solid var(--antique-gold);
            pointer-events: none;
            opacity: 0.6;
        }
        .tl { top: -1px; left: -1px; border-right: none; border-bottom: none; }
        .tr { top: -1px; right: -1px; border-left: none; border-bottom: none; }
        .bl { bottom: -1px; left: -1px; border-right: none; border-top: none; }
        .br { bottom: -1px; right: -1px; border-left: none; border-top: none; }

        .cta-gold {
            background: linear-gradient(135deg, #8e6c27 0%, #cf9e42 50%, #8e6c27 100%);
            color: var(--sacred-red);
            text-transform: uppercase;
            letter-spacing: 0.25em;
            font-size: 0.75rem;
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
        }
        .cta-gold:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .cta-outline-gold {
            background: transparent;
            border: 1.5px solid var(--antique-gold);
            color: var(--antique-gold);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-size: 0.7rem;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
        }

        .thin-mandala-outline { opacity: 0.04; mix-blend-mode: plus-lighter; }

        .sandalwood-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--sandalwood), transparent);
            opacity: 0.15;
        }

        .fade-in-ritual { animation: fadeInRitual 1.2s ease-out forwards; }
        @keyframes fadeInRitual { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
